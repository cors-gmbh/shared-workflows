name: "⚙️ Update Manifest"

# Replaces the GitLab `update_manifest` stage.
# Checks out a CD/GitOps repository, updates image tags in a Helm values file, and pushes.
#
# Supports two strategies:
#   strategy=yq      — uses yq to patch specific keys in the values file (GitLab-style, for repos like limas-manifest)
#   strategy=gitops   — uses helm template to render full manifests into a directory (AS Pimcore-style, for ArgoCD ApplicationSets)

on:
  workflow_call:
    inputs:
      container-tag:
        description: "The image tag to set (e.g. develop-abcd1234)"
        required: true
        type: string
      strategy:
        description: "Manifest update strategy: yq or gitops"
        required: false
        type: string
        default: "yq"
      # --- CD repository ---
      cd-repo:
        description: "CD/GitOps repository name (within same org, e.g. my-manifest)"
        required: true
        type: string
      cd-repo-branch:
        description: "Branch in CD repo to update"
        required: false
        type: string
        default: "main"
      # --- strategy=yq ---
      values-file:
        description: "Values file to update (for strategy=yq, e.g. values-staging.yaml)"
        required: false
        type: string
        default: ""
      yq-expressions:
        description: |
          Newline-separated yq expressions, e.g.:
            .pimcore.image.tag = "$TAG"
            .nginx.image.tag = "$TAG"
          $TAG will be replaced with container-tag.
        required: false
        type: string
        default: |
          .pimcore.image.tag = "$TAG"
          .nginx.image.tag = "$TAG"
          .supervisord.image.tag = "$TAG"
          .pimcore.cli.image.tag = "$TAG"
      # --- strategy=gitops ---
      helm-chart-path:
        description: "Path to Helm chart in source repo (for strategy=gitops)"
        required: false
        type: string
        default: "helm"
      gitops-environments:
        description: |
          JSON array of environments to render, e.g.:
          [{"name":"test","namespace":"test-pimcore","values":"values.yaml,values-test.yaml","dir":"nonprod/test-pimcore/test"}]
        required: false
        type: string
        default: "[]"
      gitops-helm-set:
        description: "Additional --set flags for helm template (applied to all environments)"
        required: false
        type: string
        default: ""
    secrets:
      cd_push_token:
        description: "Token to push to CD repo (PAT or GitHub App token)"
        required: false
      gh_app_private_key:
        description: "GitHub App private key (alternative to cd_push_token)"
        required: false

jobs:
  # ========================================
  # Strategy: yq (simple values file update)
  # ========================================
  update-yq:
    name: "Update values via yq"
    if: inputs.strategy == 'yq'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Create GitHub App Token
        id: app-token
        continue-on-error: true
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.GH_APP_ID }}
          private-key: ${{ secrets.gh_app_private_key }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ inputs.cd-repo }}

      - name: Determine push token
        id: token
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
          CD_PUSH_TOKEN: ${{ secrets.cd_push_token }}
        run: |
          if [ -n "$APP_TOKEN" ]; then
            echo "value=${APP_TOKEN}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${CD_PUSH_TOKEN}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout CD Repo
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository_owner }}/${{ inputs.cd-repo }}
          ref: ${{ inputs.cd-repo-branch }}
          token: ${{ steps.token.outputs.value }}

      - name: Install yq
        uses: mikefarah/yq@master

      - name: Update image tags
        env:
          CONTAINER_TAG: ${{ inputs.container-tag }}
          VALUES_FILE: ${{ inputs.values-file }}
          CD_REPO_BRANCH: ${{ inputs.cd-repo-branch }}
          YQ_EXPRESSIONS: ${{ inputs.yq-expressions }}
        run: |
          TAG="$CONTAINER_TAG"
          FILE="$VALUES_FILE"

          if [ -z "$FILE" ]; then
            FILE="values-${CD_REPO_BRANCH}.yaml"
          fi

          echo "Updating $FILE with tag $TAG"

          while IFS= read -r expr; do
            # trim leading/trailing whitespace (do NOT use xargs: it strips quotes)
            expr=$(printf '%s' "$expr" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')
            [ -z "$expr" ] && continue
            resolved=$(echo "$expr" | sed "s/\$TAG/$TAG/g")
            echo "  yq: $resolved"
            yq -i eval "$resolved" "$FILE"
          done <<< "$YQ_EXPRESSIONS"

      - name: Commit and push
        uses: EndBug/add-and-commit@v9
        with:
          author_name: github-actions[bot]
          author_email: github-actions[bot]@users.noreply.github.com
          message: "chore: update image tag to ${{ inputs.container-tag }}"
          push: origin ${{ inputs.cd-repo-branch }}

  # ====================================================
  # Strategy: gitops (helm template → rendered manifests)
  # ====================================================
  update-gitops:
    name: "Update manifests via helm template"
    if: inputs.strategy == 'gitops'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Create GitHub App Token
        id: app-token
        continue-on-error: true
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.GH_APP_ID }}
          private-key: ${{ secrets.gh_app_private_key }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ inputs.cd-repo }}

      - name: Determine push token
        id: token
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
          CD_PUSH_TOKEN: ${{ secrets.cd_push_token }}
        run: |
          if [ -n "$APP_TOKEN" ]; then
            echo "value=${APP_TOKEN}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${CD_PUSH_TOKEN}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout Source Repo
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
          path: source

      - name: Checkout GitOps Repo
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository_owner }}/${{ inputs.cd-repo }}
          ref: ${{ inputs.cd-repo-branch }}
          token: ${{ steps.token.outputs.value }}
          path: infra

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Update Helm dependencies
        working-directory: source/${{ inputs.helm-chart-path }}
        run: helm dependency update

      - name: Render manifests for all environments
        env:
          REPO_OWNER: ${{ github.repository_owner }}
          CONTAINER_TAG: ${{ inputs.container-tag }}
          HELM_CHART_PATH: ${{ inputs.helm-chart-path }}
          GITOPS_ENVIRONMENTS: ${{ inputs.gitops-environments }}
          GITOPS_HELM_SET: ${{ inputs.gitops-helm-set }}
        run: |
          REGISTRY="ghcr.io/$(echo "$REPO_OWNER" | tr '[:upper:]' '[:lower:]')"

          echo "$GITOPS_ENVIRONMENTS" | jq -c '.[]' | while read -r env; do
            name=$(echo "$env" | jq -r '.name')
            namespace=$(echo "$env" | jq -r '.namespace')
            values=$(echo "$env" | jq -r '.values')
            dir=$(echo "$env" | jq -r '.dir')
            release=$(echo "$env" | jq -r '.release // ("pimcore-" + .name)')
            extra_set=$(echo "$env" | jq -r '.helm_set // ""')

            echo "::group::Rendering $name (namespace=$namespace)"

            mkdir -p "./infra/${dir}"
            touch "./infra/${dir}/config-kustomize.yaml"

            VALUES_FLAGS=""
            IFS=',' read -ra vfiles <<< "$values"
            for vf in "${vfiles[@]}"; do
              vf=$(echo "$vf" | xargs)
              VALUES_FLAGS="${VALUES_FLAGS} --values source/${HELM_CHART_PATH}/${vf}"
            done

            helm template "${release}" "source/${HELM_CHART_PATH}" \
              --namespace="${namespace}" \
              ${VALUES_FLAGS} \
              --set "pimcore.image.tag=${CONTAINER_TAG}" \
              --set "nginx.image.tag=${CONTAINER_TAG}" \
              --set "supervisord.image.tag=${CONTAINER_TAG}" \
              --set "pimcore.cli.image.tag=${CONTAINER_TAG}" \
              ${GITOPS_HELM_SET} \
              ${extra_set} \
              > "./infra/${dir}/manifests.yaml"

            echo "::endgroup::"
          done

      - name: Commit and push
        uses: EndBug/add-and-commit@v9
        with:
          cwd: infra
          author_name: github-actions[bot]
          author_email: github-actions[bot]@users.noreply.github.com
          message: "chore: deploy ${{ inputs.container-tag }}"
          push: origin HEAD:${{ inputs.cd-repo-branch }}
