name: "⚙️ PHP Test"

on:
  workflow_call:
    inputs:
      php-version:
        description: "PHP version (e.g. 8.3, 8.4). Used as fallback when versions-from-env is on but .env has no DOCKER_PHP_VERSION."
        required: false
        type: string
        default: "8.4"
      versions-from-env:
        description: "Read PHP version from the repo's .env (DOCKER_PHP_VERSION) — single source of truth, same as dev-compose."
        required: false
        type: boolean
        default: false
      env-file:
        description: "Path to the .env file to read the PHP version from (when versions-from-env is true)"
        required: false
        type: string
        default: ".env"
      # --- Pimcore-specific ---
      pimcore:
        description: "Enable Pimcore-specific steps (build:classes, cache warmup)"
        required: false
        type: boolean
        default: true
      # --- Which checks to run ---
      ecs:
        description: "Run ECS (Easy Coding Standard)"
        required: false
        type: boolean
        default: true
      ecs-paths:
        description: "Paths for ECS (space-separated)"
        required: false
        type: string
        default: "src"
      phpstan:
        description: "Run PHPStan"
        required: false
        type: boolean
        default: false
      phpstan-config:
        description: "PHPStan config file (empty = default)"
        required: false
        type: string
        default: ""
      psalm:
        description: "Run Psalm"
        required: false
        type: boolean
        default: false
      psalm-paths:
        description: "Paths for Psalm"
        required: false
        type: string
        default: "src"
      lint-twig:
        description: "Run Twig linting"
        required: false
        type: boolean
        default: true
      lint-twig-paths:
        description: "Paths for Twig linting (space-separated)"
        required: false
        type: string
        default: "templates"
      lint-yaml:
        description: "Run YAML linting"
        required: false
        type: boolean
        default: true
      lint-yaml-paths:
        description: "Paths for YAML linting (space-separated)"
        required: false
        type: string
        default: "config"
      lint-container:
        description: "Run Symfony container linting"
        required: false
        type: boolean
        default: true
    secrets:
      composer_auth:
        description: "Composer auth JSON for private packages"
        required: false

env:
  COMPOSER_AUTH: ${{ secrets.composer_auth }}

jobs:
  # ===========================================================================
  # Resolve PHP version (from .env when versions-from-env is on, else input)
  # ===========================================================================
  resolve-versions:
    name: "Resolve versions"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      php-version: ${{ steps.v.outputs.php }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve PHP version
        id: v
        env:
          FROM_ENV: ${{ inputs.versions-from-env }}
          ENV_FILE: ${{ inputs.env-file }}
          IN_PHP: ${{ inputs.php-version }}
        run: |
          # .env authoritative when versions-from-env is on; input is the fallback.
          php="$IN_PHP"
          if [ "$FROM_ENV" = "true" ] && [ -f "$ENV_FILE" ]; then
            ev=$(sed -nE "s/^[[:space:]]*DOCKER_PHP_VERSION=[\"']?([^\"'#[:space:]]+).*/\1/p" "$ENV_FILE" | head -1)
            [ -n "$ev" ] && php="$ev"
            echo "Resolved from ${ENV_FILE}: php=${php}"
          fi
          echo "php=${php}" >> "$GITHUB_OUTPUT"

  # ===========================================================================
  # ECS + Symfony Linting (Twig, YAML, Container)
  # ===========================================================================
  lint:
    name: "Lint"
    needs: resolve-versions
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ needs.resolve-versions.outputs.php-version }}
          extensions: ctype, iconv, pdo_mysql, intl, zip, gd, mbstring, dom, xml
          coverage: none

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache composer dependencies
        uses: actions/cache@v5
        with:
          path: |
            ${{ steps.composer-cache.outputs.dir }}
            vendor
          key: ${{ runner.os }}-php${{ needs.resolve-versions.outputs.php-version }}-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-php${{ needs.resolve-versions.outputs.php-version }}-

      - name: Composer install
        run: composer install --no-interaction --prefer-dist

      - name: Build Pimcore classes
        if: inputs.pimcore
        run: PIMCORE_DISABLE_CACHE=1 bin/console pimcore:build:classes --env=dev
        env:
          APP_ENV: dev

      - name: Warm up cache
        if: inputs.pimcore
        run: PIMCORE_DISABLE_CACHE=1 APP_DEBUG=1 bin/console cache:clear --env=dev
        env:
          APP_ENV: dev

      - name: ECS
        if: inputs.ecs
        env:
          ECS_PATHS: ${{ inputs.ecs-paths }}
        run: vendor/bin/ecs check $ECS_PATHS

      - name: Lint Twig
        if: inputs.lint-twig
        env:
          TWIG_PATHS: ${{ inputs.lint-twig-paths }}
        run: |
          for path in $TWIG_PATHS; do
            if [ -d "$path" ]; then
              bin/console lint:twig "$path"
            fi
          done

      - name: Lint YAML
        if: inputs.lint-yaml
        env:
          YAML_PATHS: ${{ inputs.lint-yaml-paths }}
        run: bin/console lint:yaml $YAML_PATHS --parse-tags --no-debug

      - name: Lint Container
        if: inputs.lint-container
        run: bin/console lint:container

  # ===========================================================================
  # PHPStan (separate job — runs in parallel with lint)
  # ===========================================================================
  phpstan:
    name: "PHPStan"
    if: inputs.phpstan
    needs: resolve-versions
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ needs.resolve-versions.outputs.php-version }}
          extensions: ctype, iconv, pdo_mysql, intl, zip, gd, mbstring, dom, xml
          coverage: none

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache composer dependencies
        uses: actions/cache@v5
        with:
          path: |
            ${{ steps.composer-cache.outputs.dir }}
            vendor
          key: ${{ runner.os }}-php${{ needs.resolve-versions.outputs.php-version }}-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-php${{ needs.resolve-versions.outputs.php-version }}-

      - name: Composer install
        run: composer install --no-interaction --prefer-dist

      - name: Build Pimcore classes
        if: inputs.pimcore
        run: PIMCORE_DISABLE_CACHE=1 bin/console pimcore:build:classes --env=dev
        env:
          APP_ENV: dev

      - name: Warm up cache
        run: bin/console cache:warmup --env=dev
        env:
          APP_ENV: dev

      - name: PHPStan
        env:
          PHPSTAN_CONFIG: ${{ inputs.phpstan-config }}
        run: |
          if [ -n "$PHPSTAN_CONFIG" ]; then
            vendor/bin/phpstan analyse -c "$PHPSTAN_CONFIG"
          else
            vendor/bin/phpstan analyse
          fi

  # ===========================================================================
  # Psalm (separate job — runs in parallel with lint)
  # ===========================================================================
  psalm:
    name: "Psalm"
    if: inputs.psalm
    needs: resolve-versions
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ needs.resolve-versions.outputs.php-version }}
          extensions: ctype, iconv, pdo_mysql, intl, zip, gd, mbstring, dom, xml
          coverage: none

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache composer dependencies
        uses: actions/cache@v5
        with:
          path: |
            ${{ steps.composer-cache.outputs.dir }}
            vendor
          key: ${{ runner.os }}-php${{ needs.resolve-versions.outputs.php-version }}-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-php${{ needs.resolve-versions.outputs.php-version }}-

      - name: Composer install
        run: composer install --no-interaction --prefer-dist

      - name: Build Pimcore classes
        if: inputs.pimcore
        run: PIMCORE_DISABLE_CACHE=1 bin/console pimcore:build:classes --env=dev
        env:
          APP_ENV: dev

      - name: Psalm
        env:
          PSALM_PATHS: ${{ inputs.psalm-paths }}
        run: vendor/bin/psalm $PSALM_PATHS

  # ===========================================================================
  # Gate job — ensures the workflow is never fully skipped
  # ===========================================================================
  complete:
    name: "Tests Complete"
    if: always()
    needs: [lint, phpstan, psalm]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Check status
        env:
          LINT_RESULT: ${{ needs.lint.result }}
          PHPSTAN_RESULT: ${{ needs.phpstan.result }}
          PSALM_RESULT: ${{ needs.psalm.result }}
        run: |
          for result in "$LINT_RESULT" "$PHPSTAN_RESULT" "$PSALM_RESULT"; do
            if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
              echo "Job failed or was cancelled: $result"
              exit 1
            fi
          done
          echo "All tests passed or were skipped"
