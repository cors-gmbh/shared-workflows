name: "⚙️ Containerize"

on:
  workflow_call:
    inputs:
      container-tag:
        description: "Docker image tag (e.g. develop-abcd1234)"
        required: true
        type: string
      app-env:
        description: "APP_ENV for the build (staging, prod, pr)"
        required: false
        type: string
        default: "staging"
      push-latest:
        description: "Also push :branch-latest tags"
        required: false
        type: boolean
        default: false
      branch-name:
        description: "Branch name for latest tag (e.g. develop, main)"
        required: false
        type: string
        default: ""
      # --- Registry ---
      registry:
        description: "Container registry type: ghcr or gcp"
        required: false
        type: string
        default: "ghcr"
      gcp-registry-url:
        description: "GCP Artifact Registry URL (only for registry=gcp)"
        required: false
        type: string
        default: "europe-west3-docker.pkg.dev"
      gcp-registry-path:
        description: "GCP registry path after URL (e.g. cors-wolke/cors/docker)"
        required: false
        type: string
        default: ""
      # --- Build targets ---
      targets:
        description: 'JSON array of build targets, e.g. [{"target":"cors_php","image":"php-alpine-fpm"},...]'
        required: false
        type: string
        default: >-
          [
            {"target":"cors_php","image":"php-alpine-fpm"},
            {"target":"cors_php_blackfire","image":"php-alpine-fpm-blackfire"},
            {"target":"cors_php_supervisord","image":"php-alpine-supervisord"},
            {"target":"cors_php_cli","image":"php-alpine-cli"},
            {"target":"cors_nginx","image":"nginx"}
          ]
      # --- Build args ---
      dockerfile:
        description: "Dockerfile path"
        required: false
        type: string
        default: "Dockerfile"
      versions-from-env:
        description: "Read image versions (PHP/Alpine/Base) from the repo's .env (single source of truth, same as dev-compose). Explicit inputs below override .env."
        required: false
        type: boolean
        default: false
      env-file:
        description: "Path to the .env file to read versions from (when versions-from-env is true)"
        required: false
        type: string
        default: ".env"
      docker-base-version:
        description: "DOCKER_BASE_VERSION build arg (overrides .env DOCKER_BASE_IMAGE)"
        required: false
        type: string
        default: ""
      php-version:
        description: "PHP_VERSION build arg"
        required: false
        type: string
        default: ""
      nginx-version:
        description: "NGINX_VERSION build arg. Fallback when .env has no DOCKER_NGINX_VERSION (most .env files don't carry nginx)."
        required: false
        type: string
        default: ""
      alpine-version:
        description: "ALPINE_VERSION build arg"
        required: false
        type: string
        default: ""
    secrets:
      composer_auth:
        description: "Composer auth JSON for private packages (base — e.g. org-wide cors.repo.packagist token)"
        required: false
      composer_auth_extra:
        description: "Additional Composer auth JSON, merged with composer_auth (extra wins on host conflicts, e.g. repo.pimcore.com)"
        required: false
      gcp_credentials:
        description: "GCP service account key (base64, for registry=gcp)"
        required: false
      npm_github_pat:
        description: "GitHub PAT for npm packages"
        required: false
    outputs:
      image-tag:
        description: "The container image tag that was pushed"
        value: ${{ jobs.build.outputs.image-tag }}

jobs:
  build:
    name: "Build & Push"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ inputs.container-tag }}

    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(inputs.targets) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # --- GHCR Login ---
      - name: Log in to GHCR
        if: inputs.registry == 'ghcr'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --- GCP Login ---
      - name: Log in to GCP Artifact Registry
        if: inputs.registry == 'gcp'
        env:
          GCP_CREDENTIALS: ${{ secrets.gcp_credentials }}
          GCP_REGISTRY_URL: ${{ inputs.gcp-registry-url }}
        run: |
          echo "$GCP_CREDENTIALS" | base64 -d | \
            docker login -u _json_key --password-stdin "https://${GCP_REGISTRY_URL}"

      # --- Determine registry prefix ---
      - name: Set registry prefix
        id: registry
        env:
          REGISTRY_TYPE: ${{ inputs.registry }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.repository }}
          GCP_REGISTRY_URL: ${{ inputs.gcp-registry-url }}
          GCP_REGISTRY_PATH: ${{ inputs.gcp-registry-path }}
        run: |
          if [ "$REGISTRY_TYPE" = "ghcr" ]; then
            OWNER=$(echo "$REPO_OWNER" | tr '[:upper:]' '[:lower:]')
            echo "prefix=ghcr.io/${OWNER}" >> "$GITHUB_OUTPUT"
          else
            REPO_PATH=$(echo "$REPO_NAME" | tr '[:upper:]' '[:lower:]')
            echo "prefix=${GCP_REGISTRY_URL}/${GCP_REGISTRY_PATH:-cors-wolke/${REPO_PATH}}" >> "$GITHUB_OUTPUT"
          fi

      # --- Prepare tags ---
      - name: Prepare tags
        id: tags
        env:
          REGISTRY_PREFIX: ${{ steps.registry.outputs.prefix }}
          IMAGE_NAME: ${{ matrix.image }}
          CONTAINER_TAG: ${{ inputs.container-tag }}
          PUSH_LATEST: ${{ inputs.push-latest }}
          BRANCH_NAME: ${{ inputs.branch-name }}
        run: |
          IMAGE="${REGISTRY_PREFIX}/${IMAGE_NAME}"
          {
            echo "tags<<EOF"
            echo "${IMAGE}:${CONTAINER_TAG}"
            if [ "$PUSH_LATEST" = "true" ] && [ -n "$BRANCH_NAME" ]; then
              echo "${IMAGE}:${BRANCH_NAME}-latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      # --- Resolve image versions (explicit inputs win, else read from .env) ---
      - name: Resolve image versions
        id: versions
        env:
          FROM_ENV: ${{ inputs.versions-from-env }}
          ENV_FILE: ${{ inputs.env-file }}
          IN_PHP: ${{ inputs.php-version }}
          IN_ALPINE: ${{ inputs.alpine-version }}
          IN_BASE: ${{ inputs.docker-base-version }}
          IN_NGINX: ${{ inputs.nginx-version }}
        run: |
          # .env is authoritative when versions-from-env is on; inputs are the
          # fallback for keys absent from .env (e.g. nginx, which most .env files
          # don't carry — then the explicit nginx-version input is used).
          php="$IN_PHP"; alpine="$IN_ALPINE"; base="$IN_BASE"; nginx="$IN_NGINX"
          if [ "$FROM_ENV" = "true" ] && [ -f "$ENV_FILE" ]; then
            get() { sed -nE "s/^[[:space:]]*$1=[\"']?([^\"'#[:space:]]+).*/\1/p" "$ENV_FILE" | head -1; }
            ev=$(get DOCKER_PHP_VERSION);   [ -n "$ev" ] && php="$ev"
            ev=$(get DOCKER_ALPINE_VERSION); [ -n "$ev" ] && alpine="$ev"
            ev=$(get DOCKER_BASE_IMAGE);     [ -n "$ev" ] && base="$ev"
            ev=$(get DOCKER_NGINX_VERSION);  [ -n "$ev" ] && nginx="$ev"
            echo "Resolved from ${ENV_FILE}: php=${php} alpine=${alpine} base=${base} nginx=${nginx}"
          fi
          {
            echo "php=${php}"
            echo "alpine=${alpine}"
            echo "base=${base}"
            echo "nginx=${nginx}"
          } >> "$GITHUB_OUTPUT"

      # --- Prepare build args ---
      - name: Prepare build args
        id: build-args
        env:
          APP_ENV: ${{ inputs.app-env }}
          DOCKER_BASE_VERSION: ${{ steps.versions.outputs.base }}
          PHP_VERSION: ${{ steps.versions.outputs.php }}
          NGINX_VERSION: ${{ steps.versions.outputs.nginx }}
          ALPINE_VERSION: ${{ steps.versions.outputs.alpine }}
          NPM_GITHUB_PAT: ${{ secrets.npm_github_pat }}
        run: |
          {
            echo "args<<EOF"
            echo "APP_ENV=${APP_ENV}"
            [ -n "$DOCKER_BASE_VERSION" ] && echo "DOCKER_BASE_VERSION=${DOCKER_BASE_VERSION}"
            [ -n "$PHP_VERSION" ]          && echo "PHP_VERSION=${PHP_VERSION}"
            [ -n "$NGINX_VERSION" ]         && echo "NGINX_VERSION=${NGINX_VERSION}"
            [ -n "$ALPINE_VERSION" ]        && echo "ALPINE_VERSION=${ALPINE_VERSION}"
            [ -n "$NPM_GITHUB_PAT" ]        && echo "NPM_GITHUB_PAT=${NPM_GITHUB_PAT}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      # --- Determine cache backend ---
      - name: Determine cache backend
        id: cache
        env:
          REGISTRY_TYPE: ${{ inputs.registry }}
          REGISTRY_PREFIX: ${{ steps.registry.outputs.prefix }}
          IMAGE_NAME: ${{ matrix.image }}
          TARGET: ${{ matrix.target }}
        run: |
          if [ "$REGISTRY_TYPE" = "gcp" ]; then
            echo "from=type=registry,ref=${REGISTRY_PREFIX}/${IMAGE_NAME}:buildcache-${TARGET}" >> "$GITHUB_OUTPUT"
            echo "to=type=registry,ref=${REGISTRY_PREFIX}/${IMAGE_NAME}:buildcache-${TARGET},mode=max" >> "$GITHUB_OUTPUT"
          else
            echo "from=type=gha,scope=${TARGET}" >> "$GITHUB_OUTPUT"
            echo "to=type=gha,mode=max,scope=${TARGET}" >> "$GITHUB_OUTPUT"
          fi

      # --- Compose composer auth (base + extra, extra wins on host conflicts) ---
      - name: Compose composer auth
        env:
          BASE: ${{ secrets.composer_auth }}
          EXTRA: ${{ secrets.composer_auth_extra }}
        run: |
          merged=$(jq -cn --argjson a "${BASE:-{\}}" --argjson b "${EXTRA:-{\}}" '$a * $b')
          echo "COMPOSER_AUTH=$merged" >> "$GITHUB_ENV"
          echo "Composed composer auth from $(jq -rn --argjson a "${BASE:-{\}}" '($a["http-basic"]//{}|keys|length)') base + $(jq -rn --argjson b "${EXTRA:-{\}}" '($b["http-basic"]//{}|keys|length)') extra host(s)"

      # --- Build & Push ---
      - name: Build and Push ${{ matrix.image }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ inputs.dockerfile }}
          target: ${{ matrix.target }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: ${{ steps.build-args.outputs.args }}
          secrets: |
            composer_auth=${{ env.COMPOSER_AUTH }}
          cache-from: ${{ steps.cache.outputs.from }}
          cache-to: ${{ steps.cache.outputs.to }}